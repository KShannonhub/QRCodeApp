<div class="app-container">
  <nav class="tab-nav">
    <button 
      [class.active]="activeTab === 'generate'"
      (click)="switchTab('generate')"
      class="tab-btn">
      <span class="tab-icon">✨</span>
      Generate
    </button>
    <button 
      [class.active]="activeTab === 'scan'"
      (click)="switchTab('scan')"
      class="tab-btn">
      <span class="tab-icon">📷</span>
      Scan
    </button>
  </nav>

  <main class="app-main">
    <app-qr-generator *ngIf="activeTab === 'generate'"></app-qr-generator>
    <app-qr-scanner *ngIf="activeTab === 'scan'"></app-qr-scanner>
  </main>

  <footer class="app-footer">
    <a href="https://www.buymeacoffee.com/krisshannon" target="_blank">
      <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee" class="donation-btn">
    </a>
    <p>&copy; 2026 Cubey Scans. All rights reserved.</p>
  </footer>
</div>
